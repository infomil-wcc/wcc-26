<div class="tabs">
  <div class="tab-titles">
    @for (tab of tabs; track tab; let i = $index) {
      <div class="pl-2.5 pr-2.5 lg:pl-4 lg:pr-4"
        (click)="selectTab(i)"
        [class.active]="selectedTab === i"
        >
        {{ tab.title }}
      </div>
    }
  </div>
  <div class="tab-content">
    @for (tab of tabs; track tab; let i = $index) {
      @if (selectedTab === i) {
        <ng-container *ngTemplateOutlet="tab.template"></ng-container>
      }
    }
  </div>
</div>
