@if (matchDates && matchDates.length > 0) {
  <div class="calendar-strip-wrapper w-full" [class.collapsed]="isCollapsed">
    
    <button type="button" class="collapse-toggle" (click)="toggleCollapse()" [title]="isCollapsed ? 'Afficher le calendrier' : 'Masquer le calendrier'">
      <div class="toggle-left">
        <span class="material-symbols-outlined mr-1" style="font-size: 1rem;">calendar_month</span>
        <span class="toggle-label">{{ filterDate ? (filterDate | date: 'EEE d MMM') : 'Toutes les dates' }}</span>
      </div>
      <div class="toggle-right">
        <span class="toggle-action-text text-xs mr-1 opacity-70">{{ isCollapsed ? 'Afficher' : 'Masquer' }}</span>
        <span class="material-symbols-outlined toggle-chevron" [class.rotated]="isCollapsed">expand_more</span>
      </div>
    </button>

    <div class="strip-body" [class.hidden]="isCollapsed">
      <div class="container position-relative px-6">
        <button type="button" class="nav-chevron chevron-left flex items-center justify-center" (click)="scrollStrip(stripScroll, -220)" title="Défiler à gauche">
          <span class="material-symbols-outlined">chevron_left</span>
        </button>

        <div class="calendar-strip-scroll flex gap-2 overflow-x-auto pb-1" #stripScroll>
          <button 
            type="button"
            class="strip-date-card sticky-first-card flex flex-col items-center justify-center"
            [class.active]="!filterDate"
            (click)="selectDate(null)">
            <span class="strip-all-text">Toutes les dates</span>
          </button>
          
          @for (date of matchDates; track date) {
            <button 
              type="button"
              class="strip-date-card flex flex-col items-center justify-center"
              [class.active]="filterDate === date"
              (click)="selectDate(date)">
              <span class="strip-day-name text-xs opacity-60 uppercase font-semibold">{{ date | date: 'EEE' }}</span>
              <span class="strip-day-num font-bold text-lg my-0.5">{{ date | date: 'd' }}</span>
              <span class="strip-month text-xs opacity-60 uppercase font-semibold">{{ date | date: 'MMM' }}</span>
            </button>
          }
        </div>

        <button type="button" class="nav-chevron chevron-right flex items-center justify-center" (click)="scrollStrip(stripScroll, 220)" title="Défiler à droite">
          <span class="material-symbols-outlined">chevron_right</span>
        </button>
      </div>
    </div>
  </div>
}
