@if (showModal) {
  <div class="overlay flex items-center justify-center">
    <div class="modal shadow-2 relative overflow-hidden" [ngClass]="{'modalSm' : modalSize === 'sm', 'modalMd' : modalSize === 'md', 'modalLg' : modalSize === 'lg'}">
      @if (showCloseButton) {
        <button class="closeModal p-2 flex items-center justify-center" (click)="closeModal()">
          <span class="material-symbols-outlined text-base mr-0">
            close
          </span>
        </button>
      }
      <div class="modalContent">
        <ng-content></ng-content>
      </div>
    </div>
  </div>
}
