@if (bcdata) {
  <div class="breadcrump mb-2 md:mb-5">
    <ul class="flex align-items-center">
      @for (item of bcdata; track item; let lastItem = $last; let firstItem = $first) {
        <li>
          <button class="btn_breadcrump flex align-items-center" type="button" (click)="routeTo(item.route)" [ngClass]="{'active': lastItem}">
            <h2 class="text-xl ">
              {{ item.label }}
              @if (!lastItem) {
                <span class="ml-1 mr-1">/</span>
              }
            </h2>
          </button>
        </li>
      }
    </ul>
  </div>
}
