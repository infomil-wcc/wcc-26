@if (showDialog) {
  <div class="dialog fixed rounded-lg overflow-hidden left-0 right-0 ml-auto mr-auto w-10 min-h-3 shadow-1 lg:w-5">
    <div class="dialogHeader p-2 pl-4 flex justify-between sm:p-6">
      <span class="dialogTitle flex items-center font-bold"> {{ dialogTitle }}</span>
      @if (allowClose) {
        <button class="closeDialog p-1 rounded-xl flex items-center justify-center" (click)="closeDialog()">
          <span class="material-symbols-outlined text-base text-white mr-0">
            close
          </span>
        </button>
      }
    </div>
    <div class="dialogContent bg-white p-4 text-base sm:p-12">
      <ng-content></ng-content>
    </div>
  </div>
}

@if (withOverlay && showDialog) {
  <div class="overlay"></div>
}
