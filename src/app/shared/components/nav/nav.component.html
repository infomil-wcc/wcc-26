<nav class="fixed bottom-0 left-0 z-[3000] w-full bg-white border-t border-gray-200 pb-safe shadow-[0_-4px_20px_rgba(0,0,0,0.05)] md:relative md:border-none md:shadow-none md:bg-transparent md:w-auto md:pb-0">
  <div class="flex justify-around items-center h-16 md:h-full md:justify-start">
    @for (list of navList; track list; let isLast = $last) {
      @if (!list.sub) {
        <button class="flex flex-col items-center justify-center flex-1 h-full md:flex-row md:flex-none md:px-4 lg:px-6 transition-all duration-300 menu-item text-gray-500 hover:text-[#0ed4de]"
                [ngClass]="{'active': list.active}"
                [title]="list.label"
                (click)="navTo(list.route, list.label)">
          <span class="material-symbols-outlined text-[24px] mb-1 md:hidden">{{ list.icon }}</span>
          <span class="text-[10px] font-bold uppercase tracking-wider md:text-sm md:font-semibold md:normal-case md:tracking-normal">{{ list.label }}</span>
        </button>
      } @else {
        <div class="relative flex flex-col items-center justify-center flex-1 h-full md:flex-none md:px-4 lg:px-6 group">
          <button class="flex flex-col items-center justify-center h-full w-full md:flex-row transition-all duration-300 menu-item text-gray-500 hover:text-[#0ed4de]"
                  [ngClass]="{'active': list.active}"
                  [title]="list.label">
            <span class="material-symbols-outlined text-[24px] mb-1 md:hidden">{{ list.icon }}</span>
            <div class="flex items-center">
              <span class="text-[10px] font-bold uppercase tracking-wider md:text-sm md:font-semibold md:normal-case md:tracking-normal">{{ list.label }}</span>
              <span class="material-symbols-outlined text-[16px] ml-1 hidden md:block">expand_more</span>
            </div>
          </button>

          <!-- Mobile Submenu Overlay (hidden by default, can be toggled if needed, but for bottom nav, it's tricky. Let's just navigate to a submenu page, or show a slide-up menu. For simplicity, we can show a pop-up menu on click, but since hover doesn't work on mobile, we can use group-hover on desktop and a tap-to-show on mobile. For now, let's use focus-within or a simple CSS hover for desktop) -->
          <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-48 bg-white rounded-xl shadow-xl border border-gray-100 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 md:top-full md:bottom-auto md:left-0 md:translate-x-0 md:mt-2 overflow-hidden z-[4000]">
            <div class="py-2 flex flex-col">
              @for (subitem of list.sub; track subitem) {
                <button class="px-5 py-3 text-sm text-left text-gray-700 hover:bg-gray-50 hover:text-[#0ed4de] transition-colors"
                        [ngClass]="{'text-[#0ed4de] font-bold bg-blue-50/50': subitem.active}"
                        [title]="subitem.label"
                        (click)="navTo(subitem.route, subitem.label)">
                  {{ subitem.label }}
                </button>
              }
            </div>
          </div>
        </div>
      }
    }
  </div>
</nav>
