@if ($form | async; as form) {
  <div class="form-dots">
    @for (slot of form; track $index) {
      <div class="marking" [class.win]="slot.result === 'W'" [class.draw]="slot.result === 'D'" [class.loose]="slot.result === 'L'" [class.empty]="!slot.result" [title]="slot.result || 'Non joué'">
        {{ slot.result }}
      </div>
    }
  </div>
}
