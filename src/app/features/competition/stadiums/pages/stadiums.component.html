<div class="container mx-auto px-4 lg:px-8 max-w-7xl pt-6 pb-12">
  <div class="mb-8 border-b border-white/10 pb-4">
    <!-- Tailwind Breadcrumb -->
    <nav aria-label="Breadcrumb" class="mb-4">
      <ol class="flex items-center space-x-2 text-sm font-medium">
        <li class="flex items-center">
          <button (click)="choosenStadium = null" class="transition-colors duration-200" [ngClass]="!choosenStadium ? 'text-[#10b981] cursor-default font-bold' : 'text-gray-400 hover:text-white'">
            Les Stades
          </button>
        </li>
        @if (choosenStadium) {
          <li class="flex items-center">
            <span class="material-symbols-outlined text-[16px] text-gray-500 mx-2">chevron_right</span>
            <span class="text-[#10b981] cursor-default font-bold transition-colors duration-200">{{ choosenStadium.title }}</span>
          </li>
        }
      </ol>
    </nav>
    <h1 class="text-3xl md:text-4xl font-black text-white mt-4 flex items-center gap-3">
      <span class="material-symbols-outlined text-[#10b981] text-4xl">stadium</span>
      Fifa World Cup 2026
    </h1>
  </div>

  @if (stadiumData().length > 0) {
    <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6 mt-8 transition-all" [ngClass]="{'hidden': choosenStadium}">
      @for (stadium of stadiumData(); track stadium) {
        <div class="bg-white/5 backdrop-blur-md rounded-2xl p-4 flex flex-col items-center justify-center border border-white/10 shadow-lg group hover:border-[#10b981]/50 transition-colors">
          <button class="flex flex-col items-center w-full focus:outline-none" (click)="showStadium(stadium)">
            <div class="w-full aspect-[4/3] rounded-xl overflow-hidden bg-black/20">
              <img src="assets/stadium/{{ stadium.id }}.png" alt="Stade {{stadium.title}}" class="w-full h-full object-cover scale-110 group-hover:scale-100 transition-transform duration-500 ease-out" />
            </div>
            <h2 class="mt-4 text-lg font-bold text-white group-hover:text-[#10b981] transition-colors">{{ stadium.title }}</h2>
          </button>
        </div>
      }
    </div>
  } @else {
    <div class="w-full py-20 flex justify-center">
      <loader [showLoader]="true" />
    </div>
  }

  @if (choosenStadium) {
    <app-stadium-details [stadium]="choosenStadium"></app-stadium-details>
  }
</div>
