<div class="container mx-auto px-4 lg:px-8 max-w-7xl pt-6 pb-12">
  <div class="mb-8 border-b border-white/10 pb-4">
    <!-- Tailwind Breadcrumb -->
    <nav aria-label="Breadcrumb" class="mb-4">
      <ol class="flex items-center space-x-2 text-sm font-medium">
        <li class="flex items-center">
          <button (click)="facade.clearSelection()" class="transition-colors duration-200" [ngClass]="!facade.selectedTeam() ? 'text-[#10b981] cursor-default font-bold' : 'text-gray-400 hover:text-white'">
            Les Equipes
          </button>
        </li>
        @if (facade.selectedTeam(); as choosenTeam) {
          <li class="flex items-center">
            <span class="material-symbols-outlined text-[16px] text-gray-500 mx-2">chevron_right</span>
            <span class="text-[#10b981] cursor-default font-bold transition-colors duration-200">{{ choosenTeam.name }}</span>
          </li>
        }
      </ol>
    </nav>
    <h1 class="text-3xl md:text-4xl font-black text-white mt-4 flex items-center gap-3">
      <span class="material-symbols-outlined text-[#10b981] text-4xl">groups</span>
      Fifa World Cup 2026
    </h1>
  </div>

  @if (facade.teamsData(); as teams) {
    <app-team-list 
      [teams]="teams" 
      [hideList]="!!facade.selectedTeam()" 
      (teamSelected)="showTeam($event)">
    </app-team-list>
  } @else {
    <div class="w-full py-20 flex justify-center">
      <loader [showLoader]="true" />
    </div>
  }

  @if (facade.selectedTeam(); as choosenTeam) {
    <team-details 
      [team]="choosenTeam"
      [teamMatches]="facade.selectedTeamMatches()"
      [teamDetails]="facade.selectedTeamDetails()"
      [today]="facade.today() | async">
    </team-details>
  }
</div>
