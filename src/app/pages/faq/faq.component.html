<div class="container">
  <h1>FAQ</h1>

  <h3>Régles et Conditions des jeux</h3>
  <div class="rules">
    @if ($rules | async; as rules) {
      @for (item of rules; track item) {
        <div class="rule">
          <h4>{{ item.name }}</h4>
          <div class="description" [innerHTML]="item.description"></div>
        </div>
      }
    } @else {
      <loader [showLoader]="true" />
    }
  </div>
</div>
